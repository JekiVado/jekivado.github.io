<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#12292b" />
    <title>escape01 · 人流接驳原型</title>
    <script type="module" crossorigin src="./assets/index-DAHTQulT.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-Cu4CjGmr.css">
  </head>
  <body>
    <main class="prototype-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <span class="brand-mark">E</span>
          <div>
            <p class="eyebrow">FIRST PLAYABLE / 0.2</p>
            <h1>escape01</h1>
          </div>
        </div>
        <div class="level-marker"><span>关卡</span><strong id="level-number">01</strong></div>
      </header>

      <section class="briefing" aria-live="polite">
        <p class="objective" id="objective">整理电梯，接走所有下班人群。</p>
        <p class="status" id="status">先点一部电梯，再决定转移或接人。</p>
      </section>

      <section class="playfield" aria-label="人流接驳玩法原型">
        <section class="crowd-stage" id="crowd-stage" aria-label="上方等待下班的人群">
          <div class="dispatch-header">
            <span>下班长队 · 队首优先</span>
            <b>电梯上行接人</b>
          </div>
          <div class="order-dock" id="orders" aria-label="等待下班的人群"></div>
          <canvas id="crowd-canvas"></canvas>
        </section>
        <section class="elevator-stage" id="elevator-stage" aria-label="下方 3×3 电梯间">
          <div class="elevator-header"><span>电梯间 · 点击一部电梯</span><b>门口层优先</b></div>
          <canvas id="game-canvas"></canvas>
          <div class="field-key"><i></i>门口层可转移 · <b>16</b> 人满载离场</div>
        </section>
      </section>

      <section class="control-deck" aria-label="原型控制">
        <p class="selected-readout" id="selected-readout">未选择电梯 · 先点门口人群</p>
        <div class="actions">
          <button class="utility" id="undo-button" type="button">↶ 撤回一步</button>
          <button class="utility" id="restart-button" type="button">↺ 重开</button>
        </div>
        <div class="level-progress" id="level-progress" aria-label="关卡进度"></div>
      </section>

      <section class="modal hidden" id="modal" aria-live="assertive">
        <div class="modal-card">
          <p class="modal-kicker" id="modal-kicker">人流已接走</p>
          <h2 id="modal-title">这一层，清空了。</h2>
          <p id="modal-copy">下一班人正在等你。</p>
          <button class="dispatch-button" id="modal-action" type="button">下一关</button>
        </div>
      </section>
    </main>
  </body>
</html>
