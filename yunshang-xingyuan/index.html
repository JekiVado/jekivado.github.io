<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#173567" />
    <title>云上星愿 · 星轨初醒</title>
    <link rel="stylesheet" href="./styles.css?v=20260723-5" />
  </head>
  <body>
    <main class="sky-card">
      <div class="atmosphere atmosphere--one"></div>
      <div class="atmosphere atmosphere--two"></div>
      <div id="sky-decor" class="sky-decor" aria-label="已修复的天空装饰"><i data-repair="cloud-lamp">☁</i><i data-repair="star-bridge">✦</i><i data-repair="sky-observatory">☾</i></div>
      <header class="topbar">
        <button class="icon-button" id="reset-button" aria-label="重新开始本关">↺</button>
        <div class="level-label">
          <span>云端星图</span>
          <strong>初醒 · 01</strong>
        </div>
        <button class="wish-count" id="star-map-button" aria-label="打开星域地图，查看可用星愿点数">
          <span class="wish-count__spark">✦</span>
          <strong id="wish-count">0</strong>
        </button>
      </header>

      <section class="story" aria-labelledby="game-title">
        <p class="eyebrow">CLOUD ATLAS</p>
        <h1 id="game-title">把迷路的星光<br />送回它们的轨道</h1>
        <p id="hint" class="hint">依次点击两个星点，交换它们的星轨</p>
      </section>

      <section class="board-shell" aria-label="星轨解谜区域">
        <div class="halo halo--left"></div>
        <div class="halo halo--right"></div>
        <svg id="board" viewBox="0 0 100 100" role="application" aria-label="点击两个星点交换星轨，消除交叉"></svg>
      </section>

      <section class="status-panel" aria-live="polite">
        <div class="crossing-meter">
          <span class="meter-caption">星轨缠结</span>
          <div class="meter-dots" id="meter-dots" aria-hidden="true"></div>
          <strong id="crossing-label">3 处交叉</strong>
        </div>
        <p class="microcopy">每解开一处，天空就亮一点。</p>
      </section>
      <div class="completion" id="completion" hidden>
        <div class="completion__glow">✦</div>
        <p class="eyebrow">CONSTELLATION RESTORED</p>
        <h2>星座苏醒了</h2>
        <p id="completion-reward">你收下了 1 点新的星愿。</p>
        <div class="reward-slot" aria-label="预留的激励广告入口">
          <span>✦</span>
          <p>更多星愿将于后续旅程开放<br /><small>激励广告入口 · 后续开放</small></p>
        </div>
        <div class="completion__actions">
          <button id="next-button" class="next-button">下一关</button>
          <button id="open-star-map-button" class="map-button">点亮星域</button>
        </div>
      </div>

      <section class="star-map" id="star-map" aria-labelledby="star-map-title" hidden>
        <div class="star-map__stars" aria-hidden="true"></div>
        <header class="star-map__header">
          <div>
            <p class="eyebrow">SKY ATLAS</p>
            <h2 id="star-map-title">点亮星域</h2>
          </div>
          <button class="icon-button" id="close-star-map-button" aria-label="返回关卡">×</button>
        </header>
        <p class="star-map__intro">星愿只会在这里消耗。修复天空后，再主动选择进入新的星域。</p>
        <div class="map-wish-bank"><span>可用星愿</span><strong><i>✦</i><b id="map-wish-count">0</b></strong></div>
        <p class="map-message" id="map-message" aria-live="polite"></p>
        <div class="region-list" id="region-list"></div>
        <p class="star-map__note">星愿与天空修复为当前游玩会话进度；此原型暂不保存到本地。</p>
      </section>
    </main>
    <script type="module" src="./src/app.js?v=20260723-5"></script>
  </body>
</html>
